# ============================================================================
#  CONFIGURACIÓN DE INDICADORES DE COYUNTURA
# ----------------------------------------------------------------------------
#  Cada indicador tiene:
#    nombre     : cómo se llama en el CSV y en el dashboard
#    bloque     : real | monetario_financiero | fiscal | social | precios
#    fuente     : datos_gob | argentinadatos | dolar
#    id/casa    : identificador según la fuente
#    unidad     : etiqueta para los gráficos
#    graficos   : lista -> [nivel] y/o [interanual]
#
#  Para AGREGAR indicadores de datos.gob.ar (M1, M2, reservas, empleo,
#  presupuesto, pobreza, etc.) necesitás el "id" exacto de la serie.
#  Corré:   python buscar_series.py "reservas internacionales"
#  y pegá el id que te devuelva en la sección correspondiente de abajo.
# ============================================================================

start_date: "2018-01-01"   # desde cuándo traer historia la primera vez

indicadores:

  # -------------------------------------------------------------------------
  # PRECIOS  (funciona out-of-the-box)
  # -------------------------------------------------------------------------
  - nombre: "Inflación mensual (IPC)"
    bloque: precios
    fuente: argentinadatos
    endpoint: "finanzas/indices/inflacion"
    unidad: "% mensual"
    graficos: [nivel]

  - nombre: "Inflación interanual (IPC)"
    bloque: precios
    fuente: argentinadatos
    endpoint: "finanzas/indices/inflacion-interanual"
    unidad: "% i.a."
    graficos: [nivel]

  - nombre: "IPC Nacional - Nivel general (índice)"
    bloque: precios
    fuente: datos_gob
    id: "148.3_INIVELNAL_DICI_M_26"
    unidad: "índice"
    graficos: [nivel, interanual]

  # -------------------------------------------------------------------------
  # MONETARIO / FINANCIERO  (dólar y riesgo país funcionan out-of-the-box)
  # -------------------------------------------------------------------------
  - nombre: "Dólar oficial"
    bloque: monetario_financiero
    fuente: dolar
    casa: oficial
    unidad: "$/USD (venta)"
    graficos: [nivel]

  - nombre: "Dólar blue"
    bloque: monetario_financiero
    fuente: dolar
    casa: blue
    unidad: "$/USD (venta)"
    graficos: [nivel, interanual]

  - nombre: "Dólar MEP"
    bloque: monetario_financiero
    fuente: dolar
    casa: bolsa
    unidad: "$/USD (venta)"
    graficos: [nivel]

  - nombre: "Dólar CCL"
    bloque: monetario_financiero
    fuente: dolar
    casa: contadoconliqui
    unidad: "$/USD (venta)"
    graficos: [nivel]

  - nombre: "Riesgo país (EMBI)"
    bloque: monetario_financiero
    fuente: argentinadatos
    endpoint: "finanzas/indices/riesgo-pais"
    unidad: "puntos básicos"
    graficos: [nivel]

  # ---- COMPLETAR con: python buscar_series.py "..." --------------------
  # Descomentá y pegá el id correcto que te devuelva el buscador.
  #
  # - nombre: "Base monetaria"
  #   bloque: monetario_financiero
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "base monetaria"
  #   unidad: "millones de $"
  #   graficos: [nivel, interanual]
  #
  # - nombre: "M2 privado"
  #   bloque: monetario_financiero
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "M2 privado"
  #   unidad: "millones de $"
  #   graficos: [nivel, interanual]
  #
  # - nombre: "Reservas internacionales brutas"
  #   bloque: monetario_financiero
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "reservas internacionales"
  #   unidad: "millones de USD"
  #   graficos: [nivel]
  #
  # - nombre: "Tasa de política monetaria"
  #   bloque: monetario_financiero
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "tasa politica monetaria"
  #   unidad: "% TNA"
  #   graficos: [nivel]

  # -------------------------------------------------------------------------
  # ACTIVIDAD REAL  (EMAE funciona out-of-the-box)
  # -------------------------------------------------------------------------
  - nombre: "EMAE (actividad económica)"
    bloque: real
    fuente: datos_gob
    id: "143.3_NO_PR_2004_A_21"
    unidad: "índice 2004=100"
    graficos: [nivel, interanual]

  # ---- COMPLETAR --------------------------------------------------------
  # - nombre: "Producción industrial (IPI manufacturero)"
  #   bloque: real
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "IPI manufacturero"
  #   unidad: "índice"
  #   graficos: [nivel, interanual]

  # -------------------------------------------------------------------------
  # FISCAL  (COMPLETAR)
  # -------------------------------------------------------------------------
  # - nombre: "Resultado primario SPN"
  #   bloque: fiscal
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "resultado primario"
  #   unidad: "millones de $"
  #   graficos: [nivel]
  #
  # - nombre: "Recaudación tributaria"
  #   bloque: fiscal
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "recaudacion tributaria"
  #   unidad: "millones de $"
  #   graficos: [nivel, interanual]

  # -------------------------------------------------------------------------
  # SOCIAL / EMPLEO  (COMPLETAR)
  # -------------------------------------------------------------------------
  # - nombre: "Tasa de desempleo (EPH)"
  #   bloque: social
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "tasa de desempleo"
  #   unidad: "% PEA"
  #   graficos: [nivel]
  #
  # - nombre: "Índice de salarios (total)"
  #   bloque: social
  #   fuente: datos_gob
  #   id: "PEGAR_ID"          # buscar: "indice de salarios"
  #   unidad: "índice"
  #   graficos: [nivel, interanual]

  # -------------------------------------------------------------------------
  # NUEVOS (IDs verificados desde la ficha oficial de cada dataset)
  # -------------------------------------------------------------------------
  - {nombre: "Reservas internacionales", bloque: monetario_financiero, fuente: datos_gob, id: "92.1_RID_0_0_32", unidad: "millones de USD", vista: reservas_combo, graficos: [nivel]}
  - {nombre: "Base monetaria", bloque: monetario_financiero, fuente: datos_gob, id: "90.1_BMT_0_0_20", unidad: "millones de $", graficos: [nivel, interanual]}
  - {nombre: "M2 (agregado total)", bloque: monetario_financiero, fuente: datos_gob, id: "90.1_AMTM2_0_0_31", unidad: "millones de $", graficos: [nivel, interanual]}
  - {nombre: "M3 (agregado amplio)", bloque: monetario_financiero, fuente: datos_gob, id: "90.1_AMTM3_0_0_31", unidad: "millones de $", graficos: [nivel, interanual]}
  - {nombre: "Tasa de desempleo", bloque: social, fuente: datos_gob, id: "45.2_ECTDT_0_T_33", unidad: "% de la PEA", graficos: [nivel]}

  - {nombre: "M1 (calculado: circulante + cta. cte.)", bloque: monetario_financiero, calculo: suma, componentes: ["90.1_BMCMP_0_0_44", "90.1_DCCT_0_0_32"], unidad: "millones de $", graficos: [nivel, interanual]}
  - {nombre: "Tasa BADLAR (mayorista)", bloque: monetario_financiero, fuente: datos_gob, id: "89.2_TS_INTELAR_0_D_20", unidad: "% TNA", graficos: [nivel]}
  - {nombre: "Tasa de política monetaria", bloque: monetario_financiero, fuente: datos_gob, id: "89.2_TS_INTE_PM_0_D_16", unidad: "% TNA", graficos: [nivel]}
  - {nombre: "Salario real (INDEC deflactado por IPC)", bloque: social, calculo: real, nominal_id: "149.1_TL_INDIIOS_OCTU_0_21", deflactor_id: "148.3_INIVELNAL_DICI_M_26", unidad: "índice base 100 al inicio", graficos: [nivel, interanual]}

  # =========================================================================
  # EMAE POR SECTOR  ->  alimentan el SEMÁFORO (no generan gráfico de línea)
  # IDs verificados desde la ficha oficial del dataset (datos.gob.ar sspm_11.3)
