  - {nombre: "EMAE · Inmobiliarias y empresariales", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_SEGA_2004_M_48", semaforo: true}
  - {nombre: "EMAE · Administración pública y defensa", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_C_2004_M_60", semaforo: true}
  - {nombre: "EMAE · Enseñanza", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_CMMR_2004_M_10", semaforo: true}
  - {nombre: "EMAE · Servicios sociales y de salud", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_HR_2004_M_24", semaforo: true}
