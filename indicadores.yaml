  # ---------------- CONSUMO DURABLE (proxy de patentamientos) ----------------
  # No existe API abierta de "patentamientos" (altas/transferencias registrales que releva el
  # Registro Nacional de la Propiedad del Automotor y publica ACARA mensualmente): ACARA es un
  # sitio JS sin datos abiertos, con reportes mensuales en PDF detrás de URLs no predecibles
  # (nombres de archivo distintos cada mes). ADEFA (fabricantes) sí tiene URL predecible para su
  # informe de prensa mensual, pero ese informe reporta producción/exportaciones/ventas
  # mayoristas, no patentamientos. En su lugar se usa la venta de vehículos 0km al mercado
  # interno que reporta ADEFA vía datos.gob.ar (dataset 330, "Datos históricos de la industria
  # automotriz"): verificado que nacional (14.311) + importado (29.785) = 44.096 unidades en
  # jun-2026, coincide exacto con "Ventas Mayoristas" del informe de prensa oficial de ADEFA de
  # ese mes -- misma cifra, vía API en vez de PDF.
  - {nombre: "Venta de vehículos 0km al mercado interno", bloque: real, grupo: "Consumo", calculo: suma, componentes: ["330.3_VENTAS_MERTAL__49", "330.3_VENTAS_MERTAL_III__49"], unidad: "unidades", nota: "Ventas de vehículos 0km al mercado interno (nacional + importado), fuente ADEFA vía datos.gob.ar (dataset 330). Es un PROXY de consumo de bienes durables, no 'patentamientos': mide ventas de la industria automotriz al mercado interno (equivalente a las 'ventas mayoristas a concesionarios' del informe de prensa mensual de ADEFA), distinto de las altas/transferencias registrales que releva el Registro Nacional de la Propiedad del Automotor y publica ACARA mensualmente (esa fuente no tiene datos abiertos ni un formato estable para incorporar acá). Ambas series suelen moverse de forma parecida pero no son intercambiables."}

