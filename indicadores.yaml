# ============================================================================
#  INDICADORES DE COYUNTURA  ·  agrupados por 'grupo' (subtítulo en el tablero)
#  - 'desde' controla desde cuándo se ve cada gráfico (default: 2024)
#  - los sectores del EMAE alimentan el SEMÁFORO (no hacen gráfico de línea)
# ============================================================================
start_date: "2004-01-01"   # se baja historia larga; cada gráfico se recorta con 'desde'

indicadores:

  # ---------------- PRECIOS ----------------
  - {nombre: "Inflación mensual (IPC)", bloque: precios, grupo: "Precios", fuente: argentinadatos, endpoint: "finanzas/indices/inflacion", unidad: "% mensual", barras: true}
  - {nombre: "Inflación interanual (IPC)", bloque: precios, grupo: "Precios", calculo: interanual, base_id: "148.3_INIVELNAL_DICI_M_26", unidad: "% i.a.", barras: true, nota: "Variación interanual calculada como (IPC_t / IPC_t-12m - 1) × 100 a partir del IPC Nacional Nivel general de datos.gob.ar (148.3_INIVELNAL_DICI_M_26; se sigue trayendo esta serie para el cálculo aunque no tenga tarjeta propia en el dashboard)."}

  # -- IPC por categoría analítica: Núcleo / Regulados / Estacionales (INDEC no publica
  #    ponderadores para esta clasificación específica -> variación % simple, sin ponderar) --
  - {nombre: "IPC Núcleo (var. mensual)", bloque: precios, grupo: "Precios", calculo: mensual, base_id: "148.3_INUCLEONAL_DICI_M_19", unidad: "% mensual", solo_componente: true}
  - {nombre: "IPC Regulados (var. mensual)", bloque: precios, grupo: "Precios", calculo: mensual, base_id: "148.3_IREGULANAL_DICI_M_22", unidad: "% mensual", solo_componente: true}
  - {nombre: "IPC Estacionales (var. mensual)", bloque: precios, grupo: "Precios", calculo: mensual, base_id: "148.3_IESTACINAL_DICI_M_25", unidad: "% mensual", solo_componente: true}
  - {nombre: "Inflación mensual por categoría (Núcleo/Regulados/Estacionales)", bloque: precios, grupo: "Precios", vista: overlay, series: ["IPC Núcleo (var. mensual)", "IPC Regulados (var. mensual)", "IPC Estacionales (var. mensual)"], unidad: "% mensual", nota: "Variación % mensual de cada categoría (dataset 148, INDEC/datos.gob.ar), SIN ponderar: a diferencia de las divisiones de consumo (que sí tienen ponderador publicado, ver Cuadro 7), el INDEC no publica un ponderador específico para la clasificación Núcleo/Regulados/Estacionales. No representa incidencia, sólo la variación de precios propia de cada categoría."}

  # -- Incidencia en inflación por división de consumo (barras apiladas, ponderada) --
  # Ponderador nacional = Σ (peso de la región en el gasto total × peso de la división en esa
  # región), fórmula (14)/(15) de INDEC, "Metodología del IPC" N°32 (nov-2019), pág. 23 (Cuadro 6:
  # pesos regionales GBA 0,447 / Pampeana 0,342 / NEA 0,045 / NOA 0,069 / Cuyo 0,052 / Patagonia
  # 0,046) aplicada a la estructura de ponderaciones regionales por división del Cuadro 7 (pág.
  # 45-47, base dic-2016). PDF guardado en fuentes/indec_metodologia_ipc_nacional_2019.pdf.
  # Validado: la suma de incidencias mensuales de las 12 divisiones reproduce la variación real
  # del nivel general con una brecha de ~0,03pp (aproximación de ponderador fijo base dic-2016).
  - {nombre: "IPC división: Alimentos y bebidas no alcohólicas", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IALIMENNAL_DICI_M_45", unidad: "índice", peso_nacional: 0.2700, solo_componente: true}
  - {nombre: "IPC división: Bebidas alcohólicas y tabaco", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IBEBIDANAL_DICI_M_39", unidad: "índice", peso_nacional: 0.0349, solo_componente: true}
  - {nombre: "IPC división: Prendas de vestir y calzado", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IPRENDANAL_DICI_M_35", unidad: "índice", peso_nacional: 0.0992, solo_componente: true}
  - {nombre: "IPC división: Vivienda, agua, electricidad y otros combustibles", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IVIVIENNAL_DICI_M_52", unidad: "índice", peso_nacional: 0.0941, solo_componente: true}
  - {nombre: "IPC división: Equipamiento y mantenimiento del hogar", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IEQUIPANAL_DICI_M_46", unidad: "índice", peso_nacional: 0.0637, solo_componente: true}
  - {nombre: "IPC división: Salud", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_ISALUDNAL_DICI_M_18", unidad: "índice", peso_nacional: 0.0801, solo_componente: true}
  - {nombre: "IPC división: Transporte", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_ITRANSPNAL_DICI_M_23", unidad: "índice", peso_nacional: 0.1100, solo_componente: true}
  - {nombre: "IPC división: Comunicación", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_ICOMUNINAL_DICI_M_27", unidad: "índice", peso_nacional: 0.0282, solo_componente: true}
  - {nombre: "IPC división: Recreación y cultura", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IRECREANAL_DICI_M_31", unidad: "índice", peso_nacional: 0.0726, solo_componente: true}
  - {nombre: "IPC división: Educación", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IEDUCACNAL_DICI_M_22", unidad: "índice", peso_nacional: 0.0232, solo_componente: true}
  - {nombre: "IPC división: Restaurantes y hoteles", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IRESTAUNAL_DICI_M_33", unidad: "índice", peso_nacional: 0.0898, solo_componente: true}
  - {nombre: "IPC división: Bienes y servicios varios", bloque: precios, grupo: "Precios", fuente: datos_gob, id: "146.3_IBIENESNAL_DICI_M_36", unidad: "índice", peso_nacional: 0.0353, solo_componente: true}
  - {nombre: "Incidencia en inflación por división de consumo", bloque: precios, grupo: "Precios", vista: incidencia_stack, top_n: 5, series: ["IPC división: Alimentos y bebidas no alcohólicas", "IPC división: Bebidas alcohólicas y tabaco", "IPC división: Prendas de vestir y calzado", "IPC división: Vivienda, agua, electricidad y otros combustibles", "IPC división: Equipamiento y mantenimiento del hogar", "IPC división: Salud", "IPC división: Transporte", "IPC división: Comunicación", "IPC división: Recreación y cultura", "IPC división: Educación", "IPC división: Restaurantes y hoteles", "IPC división: Bienes y servicios varios"], unidad: "p.p.", nota: "Incidencia mensual = variación % de cada división × ponderador nacional de la división. Ponderador nacional calculado como Σ (peso de la región en el gasto total × peso de la división en esa región), fórmula oficial del INDEC (Metodología del IPC N°32, nov-2019, fórmulas 14/15, pág. 23), con los pesos regionales del Cuadro 6 y la estructura de ponderaciones por división del Cuadro 7 (base diciembre 2016). PDF fuente en fuentes/indec_metodologia_ipc_nacional_2019.pdf. La suma de las 12 incidencias reproduce la variación real del nivel general con una brecha de ~0,03 puntos porcentuales, propia de usar un ponderador fijo de base dic-2016 en vez del encadenamiento más fino que aplica el INDEC internamente. El eje del gráfico se autoescala sobre el percentil 95 de la incidencia mensual (no el máximo histórico): meses atípicos como feb-2024 (varias divisiones subieron 15-25% en un solo mes, por el shock devaluatorio de inicios de la gestión Milei) quedan marcados con ⚠ en vez de estirar el eje y aplastar la lectura del resto de los meses — pasando el mouse por la marca se ve el valor real de ese mes. El gráfico muestra sólo las 5 divisiones de mayor ponderador nacional (Alimentos, Transporte, Prendas de vestir, Vivienda, Restaurantes y hoteles — ~67% del gasto total) más un 'Resto' con la suma de las 7 divisiones restantes: con las 12 completas apiladas, cada franja quedaba demasiado angosta para distinguirla a simple vista. El corte top 5 se recalcula solo por ponderador (no una lista fija), y el detalle de cada división del 'Resto' sigue disponible en las notas del pie y en data/series_largo.csv."}

  # -- REM (BCRA): expectativa de mercado a un mes vista, siempre la encuesta más reciente
  #    disponible para cada mes (ver fetch_rem_variable en fetchers.py). Fuente: único Excel
  #    histórico que publica el BCRA en una URL fija (se actualiza una vez por mes, con cada
  #    encuesta nueva). El Excel pesa ~1,5 MB: para no descargarlo de nuevo en cada corrida
  #    diaria del pipeline sin necesidad, se cachea en data/_cache_rem.csv y sólo se vuelve a
  #    descargar si la caché tiene más de REM_FRESCURA_DIAS (7) días --
  - {nombre: "Inflación esperada (REM, próximo mes)", bloque: precios, grupo: "Precios", fuente: rem_bcra, variable: "Precios minoristas (IPC nivel general; INDEC)", referencia: "var. % mensual", unidad: "% mensual", solo_componente: true}
  - {nombre: "Inflación efectiva vs. esperada (REM)", bloque: precios, grupo: "Precios", vista: overlay, series: ["Inflación mensual (IPC)", "Inflación esperada (REM, próximo mes)"], unidad: "% mensual", nota: "Relevamiento de Expectativas de Mercado (REM, BCRA), variable 'Precios minoristas (IPC nivel general; INDEC)', referencia 'var. % mensual'. Cada punto de 'Inflación esperada' es la mediana de la encuesta hecha a fin del mes ANTERIOR para el mes en cuestión (horizonte de 1 mes) -- siempre la expectativa más fresca disponible para ese mes, nunca una proyección vieja de varios meses atrás -- para poder comparar de forma honesta qué esperaba el mercado en cada momento contra lo que efectivamente pasó después. Fuente: único archivo Excel histórico del BCRA (bcra.gob.ar), que se actualiza una vez por mes; el pipeline lo recachea como máximo una vez por semana (no en cada corrida diaria) para no generar tráfico innecesario contra el servidor del BCRA."}

  # ---------------- DÓLAR ----------------
  - {nombre: "Dólar oficial", bloque: monetario_financiero, grupo: "Dólar", fuente: dolar, casa: oficial, unidad: "$/USD (venta)"}
  - {nombre: "Dólar blue", bloque: monetario_financiero, grupo: "Dólar", fuente: dolar, casa: blue, unidad: "$/USD (venta)"}
  - {nombre: "Dólar MEP", bloque: monetario_financiero, grupo: "Dólar", fuente: dolar, casa: bolsa, unidad: "$/USD (venta)"}
  - {nombre: "Dólar CCL", bloque: monetario_financiero, grupo: "Dólar", fuente: dolar, casa: contadoconliqui, unidad: "$/USD (venta)"}
  # ---------------- BRECHA Y TIPO DE CAMBIO REAL ----------------
  - {nombre: "Brecha cambiaria (CCL/oficial)", bloque: monetario_financiero, grupo: "Brecha y TCR", calculo: brecha, casa_alta: contadoconliqui, casa_base: oficial, unidad: "%", nota: "Brecha calculada como (CCL/oficial - 1) × 100 a partir de cotizaciones diarias de ArgentinaDatos."}
  - {nombre: "Tipo de cambio real multilateral", bloque: monetario_financiero, grupo: "Brecha y TCR", fuente: datos_gob, id: "116.4_TCRZE_2015_D_36_4", unidad: "índice", rezago_normal_dias: 210, nota: "Serie diaria (116.4_TCRZE_2015_D_36_4). Reemplaza a la mensual 116.3_TCRMA_0_M_36, discontinuada por el BCRA en datos.gob.ar desde 12/2024. La serie diaria también se publica con rezago (~5-6 meses) porque depende de IPC de varios países."}

  # ---------------- RIESGO PAÍS ----------------
  - {nombre: "Riesgo país (EMBI)", bloque: monetario_financiero, grupo: "Riesgo país", fuente: argentinadatos, endpoint: "finanzas/indices/riesgo-pais", unidad: "puntos básicos"}

  # ---------------- RESERVAS (compra/venta + stock) ----------------
  - {nombre: "Reservas internacionales (BCRA)", bloque: monetario_financiero, grupo: "Reservas", fuente: bcra, id_variable: 1, unidad: "millones de USD", vista: reservas_combo, nota: "Barras = variación mensual del stock de reservas (diferencia entre el cierre de un mes y el anterior); NO equivalen a compras/ventas spot del BCRA, que pueden diferir por pagos de deuda, valuación de oro/DEGs u otros movimientos contables. Línea = stock total de reservas internacionales (eje derecho)."}
  - {nombre: "Compras netas de divisas del BCRA", bloque: monetario_financiero, grupo: "Reservas", fuente: datos_gob, id: "331.1_COMPRAS_NETAL__45", unidad: "millones de $", nota: "Compras netas de divisas del BCRA en el mercado de cambios (dataset 331 'Factores de explicación de Base Monetaria', datos.gob.ar), expresadas en millones de pesos: reflejan el impacto monetario de la intervención cambiaria (pesos emitidos o absorbidos), no el stock de dólares comprado. Se evaluó también publicar 'reservas netas' (reservas brutas menos pasivos en moneda extranjera), pero el único pasivo del BCRA en dólares disponible en datos.gob.ar (id 92.2_PASIVOS_MORES_0_0_33_100) tiene un quiebre de escala en la fuente (pasa de ~600 millones de USD en 2003 a 16.007.483 en 2026, un salto sin sentido económico) — se prefirió no publicar un número construido sobre un dato roto en vez de inventar una corrección."}
  - {nombre: "Compras netas de divisas: Sector privado", bloque: monetario_financiero, grupo: "Reservas", fuente: datos_gob, id: "331.1_COMPRAS_NEROS__40", unidad: "millones de $", solo_componente: true}
  - {nombre: "Compras netas de divisas: Tesoro Nacional", bloque: monetario_financiero, grupo: "Reservas", fuente: datos_gob, id: "331.1_COMPRAS_NENAL__39", unidad: "millones de $", solo_componente: true}
  - {nombre: "Compras netas de divisas por contraparte", bloque: monetario_financiero, grupo: "Reservas", vista: overlay, series: ["Compras netas de divisas: Sector privado", "Compras netas de divisas: Tesoro Nacional"], unidad: "millones de $", nota: "Desagregado de las compras netas de divisas del BCRA por contraparte (dataset 331, datos.gob.ar). Verificado: sector privado + Tesoro Nacional = compras netas totales, exacto."}
  - {nombre: "Balance cambiario (compras netas + reservas brutas)", bloque: monetario_financiero, grupo: "Reservas", vista: balance_cambiario, series: ["Compras netas de divisas del BCRA", "Reservas internacionales (BCRA)"], unidad: "millones de $", nota: "Barras = compras netas de divisas del BCRA en el mercado de cambios (dataset 331, datos.gob.ar, mensual). Línea = stock de reservas internacionales brutas (BCRA, diario, eje derecho, resampleado a fin de mes). A diferencia del combo de 'Reservas internacionales (BCRA)' de más arriba (cuyas barras son la variación mes a mes del propio stock), acá las barras son la compra/venta neta REAL informada por el BCRA -- el stock de reservas también se mueve por otros factores (pagos de deuda, valuación de oro/DEGs, etc.), así que las barras y la pendiente de la línea no tienen por qué coincidir mes a mes."}
  # -- Reservas ajustadas: NO es "reservas netas" -- ese término tiene una definición de mercado
  #    específica (fórmula de 4 componentes, ver nota) y llamar igual a un cálculo con sólo 2 de
  #    esos 4 componentes generaría confusión al compararlo con la cifra de Machado u otros
  #    analistas. Investigado a fondo: de los 4 componentes de la fórmula estándar, sólo 2 tienen
  #    fuente pública verificable y estable; los otros 2 sólo aparecen en notas al pie en prosa
  #    (sin celda de tabla fija), con redacción que cambia de mes a mes -- no se rascan por ser
  #    demasiado frágiles --
  - {nombre: "Reservas ajustadas (swap China + organismos internacionales)", bloque: monetario_financiero, grupo: "Reservas", calculo: reservas_ajustadas, unidad: "millones de USD", desde: "2024-07-31", nota: "Reservas brutas (BCRA, diario) menos swap de monedas con el Banco Popular de China (PBOC) menos posición con organismos internacionales. NO es 'reservas netas': ese término de mercado (ver ej. los cuadros de Federico Machado en X, o el estándar SDDS/NEDD del FMI que el BCRA publica mensualmente) se calcula restando 4 componentes -- encajes bancarios en USD, swap con China, posición con el BIS (Banco de Pagos Internacionales) y repos a 1 año -- y acá sólo se pudieron replicar 2 con fuente pública verificable y estable. Encajes bancarios en USD y repos a 1 año NO se incluyen: sólo aparecen, cuando aparecen, como una nota al pie en prosa de la planilla mensual del BCRA (sin una celda de tabla fija), con una redacción que cambia de mes a mes -- no hay forma estable de rascarlos sin un scraper frágil que se rompa en silencio. 'Organismos internacionales' acá es el rubro 'Obligaciones con Organismos Internacionales' del Balance Semanal del BCRA (Excel único desde 1998, bcra.gob.ar), que el propio BCRA documenta como un AGREGADO de FMI + Banco de Pagos Internacionales (BIS) + otros organismos -- no es el BIS aislado como en la fórmula original de Machado. El swap con China sale de la sección II.2 ('swaps de monedas') de la planilla mensual SDDS/NEDD del BCRA (formato estándar del FMI), que tiene fila propia para el swap recién desde el cierre de diciembre de 2022 (antes estaba mezclado con otra sección, según nota del propio BCRA). El límite histórico real del gráfico está dado por la ventana móvil de ~2 años de la API de reservas diarias del BCRA -- esta ventana se desliza con la fecha actual, no crece hacia atrás con el tiempo. El tramo dic-2022 a jul-2024 no está disponible por esta razón."}

  # ---------------- AGREGADOS MONETARIOS (orden BM · M1 · M2 · M3, desde 2026) ----------------
  - {nombre: "Base monetaria", bloque: monetario_financiero, grupo: "Agregados monetarios", fuente: datos_gob, id: "90.1_BMT_0_0_20", unidad: "millones de $", desde: "2026-01-01"}
  - {nombre: "M1 (circulante + cta. cte.)", bloque: monetario_financiero, grupo: "Agregados monetarios", calculo: suma, componentes: ["90.1_BMCMP_0_0_44", "90.1_DCCT_0_0_32"], unidad: "millones de $", desde: "2026-01-01", nota: "Suma de circulante (90.1_BMCMP_0_0_44) y depósitos en cuenta corriente (90.1_DCCT_0_0_32) de datos.gob.ar."}
  - {nombre: "M2 (agregado total)", bloque: monetario_financiero, grupo: "Agregados monetarios", fuente: datos_gob, id: "90.1_AMTM2_0_0_31", unidad: "millones de $", desde: "2026-01-01"}
  - {nombre: "M3 (agregado amplio)", bloque: monetario_financiero, grupo: "Agregados monetarios", fuente: datos_gob, id: "90.1_AMTM3_0_0_31", unidad: "millones de $", desde: "2026-01-01"}
  - {nombre: "Agregados monetarios (Base, M1, M2, M3)", bloque: monetario_financiero, grupo: "Agregados monetarios", vista: overlay, escala_log: true, series: ["Base monetaria", "M1 (circulante + cta. cte.)", "M2 (agregado total)", "M3 (agregado amplio)"], unidad: "millones de $", desde: "2026-01-01", nota: "Eje Y logarítmico (no un rebase a índice 100): se eligió esta opción porque preserva la relación de magnitud real entre los 4 agregados (M3 > M2 > M1 > Base) mientras hace visibles los movimientos relativos de las 4 series a la vez -- rebasar a 100 hubiera ocultado esa diferencia real de tamaño, mostrando a la Base como si fuera comparable en magnitud a M3 cuando no lo es. Con eje lineal único, Base y M1 quedaban aplastados contra el cero por el orden de magnitud de diferencia con M2/M3."}

  # ---------------- TASAS DE INTERÉS (desde 2026) ----------------
  - {nombre: "Tasa BADLAR (mayorista)", bloque: monetario_financiero, grupo: "Tasas de interés", fuente: datos_gob, id: "89.2_TS_INTELAR_0_D_20", unidad: "% TNA", desde: "2026-01-01"}
  - {nombre: "Tasa de política monetaria", bloque: monetario_financiero, grupo: "Tasas de interés", fuente: datos_gob, id: "89.2_TS_INTE_PM_0_D_16", unidad: "% TNA", desde: "2026-01-01", marca_fecha: true, nota: "El BCRA discontinuó la publicación de esta serie el 10/07/2025, en el marco del cambio de esquema de política monetaria; no hay serie sucesora oficial (para la tasa de referencia actual del mercado, ver BADLAR). Si el BCRA retoma la publicación, este gráfico se actualiza solo con los datos nuevos."}

  # ---------------- ACTIVIDAD REAL (EMAE con serie larga + semáforo) ----------------
  - {nombre: "EMAE (actividad económica)", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "143.3_NO_PR_2004_A_21", unidad: "índice 2004=100", desde: "2004-01-01", sube_es_bueno: true}

  # -- EMAE Urbano vs No urbano (Rural): agrupa los 16 sectores del EMAE ponderando por su
  #    peso real en el Valor Agregado Bruto (VAB, INDEC, dataset "Producto Interno Bruto a
  #    Precios de Mercado. Precios constantes. Base 2004", id 6.2_*, mismo año base que el
  #    EMAE), no un promedio simple. Rural = Agricultura + Pesca + Explotación de minas y
  #    canteras. Urbano = el resto de los sectores productivos, EXCEPTO "Impuestos netos de
  #    subsidios" (9,5% del total: no es una actividad con ubicación geográfica, se excluye
  #    de ambos índices). Transporte y comunicaciones (8,4%) y Electricidad, gas y agua
  #    (2,1%) son sectores mixtos (parte rural, parte urbana) sin fuente pública verificable
  #    para prorratearlos entre ambos (la EPH, por diseño, releva sólo aglomerados urbanos y
  #    no cubre población rural; el Censo releva población pero no VAB por rama y zona) —
  #    se asignan enteros a Urbano, documentado como simplificación.
  - {nombre: "EMAE No urbano (agro, minería y pesca)", bloque: real, grupo: "Actividad", calculo: combinado, componentes: [{id: "11.3_ISOM_2004_M_39", peso: 0.5807}, {id: "11.3_VIPAA_2004_M_5", peso: 0.0376}, {id: "11.3_ISD_2004_M_26", peso: 0.3817}], rebase_fecha: "2023-11-01", media_movil: 6, unidad: "índice nov-2023=100", desde: "2023-11-01", solo_componente: true}
  - {nombre: "EMAE Urbano", bloque: real, grupo: "Actividad", calculo: combinado, componentes: [{id: "11.3_VMASD_2004_M_23", peso: 0.1956}, {id: "11.3_AGCS_2004_M_41", peso: 0.1768}, {id: "11.3_SEGA_2004_M_48", peso: 0.1622}, {id: "11.3_EMC_2004_M_25", peso: 0.1087}, {id: "11.3_C_2004_M_60", peso: 0.0679}, {id: "11.3_IM_2004_M_25", peso: 0.0590}, {id: "11.3_CMMR_2004_M_10", peso: 0.0568}, {id: "11.3_HR_2004_M_24", peso: 0.0481}, {id: "11.3_VMATC_2004_M_12", peso: 0.0397}, {id: "11.3_TAC_2004_M_60", peso: 0.0337}, {id: "11.3_ITC_2004_M_21", peso: 0.0265}, {id: "11.3_P_2004_M_20", peso: 0.0248}], rebase_fecha: "2023-11-01", media_movil: 6, unidad: "índice nov-2023=100", desde: "2023-11-01", solo_componente: true}
