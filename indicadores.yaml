  - {nombre: "Manufacturas de origen agropecuario (MOA)", bloque: externo, grupo: "Exportaciones por rubro", tabla: "Exportaciones por gran rubro", fuente: datos_gob, id: "74.3_IEMOA_0_M_48", unidad: "millones de USD"}
  - {nombre: "Manufacturas de origen industrial (MOI)", bloque: externo, grupo: "Exportaciones por rubro", tabla: "Exportaciones por gran rubro", fuente: datos_gob, id: "74.3_IEMOI_0_M_46", unidad: "millones de USD"}
  - {nombre: "Combustibles y energía", bloque: externo, grupo: "Exportaciones por rubro", tabla: "Exportaciones por gran rubro", fuente: datos_gob, id: "74.3_IECE_0_M_35", unidad: "millones de USD"}
