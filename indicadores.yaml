  - {nombre: "EMAE · Hoteles y restaurantes", bloque: actividad_sectorial, fuente: datos_gob, id: "11.3_P_2004_M_20", unidad: "índice 2004=100", semaforo: true, graficos: []}
  - {nombre: "EMAE · Transporte y comunicaciones", bloque: actividad_sectorial, fuente: datos_gob, id: "11.3_EMC_2004_M_25", unidad: "índice 2004=100", semaforo: true, graficos: []}
