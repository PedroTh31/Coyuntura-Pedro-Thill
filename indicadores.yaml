  - {nombre: "Morosidad del crédito (irregularidad de cartera)", bloque: monetario_financiero, grupo: "Crédito", vista: overlay, series: ["Morosidad: sistema financiero", "Morosidad: bancos públicos", "Morosidad: bancos privados"], unidad: "%", nota: "Ratio de cartera irregular sobre financiaciones al sector privado (BCRA, dataset 332). La fuente etiqueta la unidad como 'millones de pesos' en su metadata; es un error, se trata de un ratio %."}

