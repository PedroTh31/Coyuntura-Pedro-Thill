  - {nombre: "EMAE · Hoteles y restaurantes", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_P_2004_M_20", semaforo: true}
  - {nombre: "EMAE · Transporte y comunicaciones", bloque: real, grupo: "Actividad", fuente: datos_gob, id: "11.3_EMC_2004_M_25", semaforo: true}
