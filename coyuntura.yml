name: Actualizar coyuntura

# Corre todos los lunes 12:00 UTC (09:00 hora Argentina).
# También se puede disparar a mano desde la pestaña "Actions".
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write   # necesario para que el bot pueda commitear los datos nuevos

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el pipeline
        run: python run.py

      - name: Commitear datos actualizados
        run: |
          git config user.name  "coyuntura-bot"
          git config user.email "actions@github.com"
          git add data/ output/
          if git diff --staged --quiet; then
            echo "Sin cambios esta semana."
          else
            git commit -m "Datos coyuntura $(date +'%Y-%m-%d')"
            git push
          fi
